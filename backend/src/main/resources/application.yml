spring:
  application:
    name: curatix-vault

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB

server:
  port: ${PORT:8080}

# Firebase
firebase:
  project-id: ${FIREBASE_PROJECT_ID}
  # Place your firebase-adminsdk.json in src/main/resources/
  # or set GOOGLE_APPLICATION_CREDENTIALS env var to its path
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:classpath:firebase-adminsdk.json}

# Cloudinary
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.curatix.vault: DEBUG
    org.springframework.security: INFO
